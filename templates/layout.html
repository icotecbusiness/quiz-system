<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Packages Test System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Top Bar -->
<div class="bg-blue-500 text-white px-6 py-4 flex justify-between items-center">
    <div class="text-xl font-bold">
        {% if session.get('user_id') %}
            Logged in as: {{ session.get('username') }}
        {% else %}
            Not Logged In
        {% endif %}
    </div>
    {% if session.get('user_id') %}
    <a href="/logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded font-semibold">Log Off</a>
    {% endif %}
</div>

    <!-- Main content -->
    <div class="container mx-auto p-4">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
