{% extends "layout.html" %}

{% block content %}

<h2 style="text-align:center; margin-bottom:20px;">My Results</h2>

<table style="width:80%; margin:auto; border-collapse:collapse;">

    <tr style="background:#1f4e79; color:white;">
        <th style="padding:10px;">Subject</th>
        <th>Score</th>
        <th>Total</th>
        <th>Percentage</th>
        <th>Status</th>
    </tr>

    {% for r in results %}
    <tr style="text-align:center; border-bottom:1px solid #ccc;">
        <td style="padding:10px;">{{ r.subject }}</td>
        <td>{{ r.score }}</td>
        <td>{{ r.total }}</td>
        <td>{{ r.percentage }}%</td>

        <td>
            {% if r.percentage >= 50 %}
                <span style="color:green; font-weight:bold;">PASS</span>
            {% else %}
                <span style="color:red; font-weight:bold;">FAIL</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
