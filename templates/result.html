{% extends "layout.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow p-6 rounded mt-10 text-center">
    <h2 class="text-2xl font-bold mb-4">Quiz Result</h2>

    <p class="text-lg mb-2">Score: <span class="font-semibold">{{ score }} / {{ total }}</span></p>
    <p class="text-lg mb-2">Percentage: <span class="font-semibold">{{ percentage }}%</span></p>

    <p class="text-lg font-bold mt-4">
        Status: 
        <span class="text-white px-3 py-1 rounded
            {% if percentage >= 50 %}bg-green-500{% else %}bg-red-500{% endif %}">
            {% if percentage >= 50 %}PASS{% else %}FAIL{% endif %}
        </span>
    </p>

    <a href="/dashboard" class="inline-block mt-6 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Back to Dashboard
    </a>
</div>
{% endblock %}
